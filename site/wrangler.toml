name = "vtt-ui"
compatibility_date = "2026-04-01"
pages_build_output_dir = "."

[[r2_buckets]]
binding = "PUBLIC_BUCKET"
bucket_name = "vtt-public-prod"

# NOTE: site is in transition mode — submit / scan-queue / clip-render /
# bulk-download surfaces have been stripped (the new experience lives at
# video.laughingwhales.com). The KV namespaces below are kept in the
# binding list so any function that referenced them can be reintroduced
# without re-provisioning, but no shipped function reads them today.
#   VTT_QUOTAS  (was rate counters + x402 shadow-mode would-block log)
#   VTT_API_KEYS (was Bearer-token → userId/balance cache)
[[kv_namespaces]]
binding = "VTT_QUOTAS"
id = "bfa97bf0225c4ac19ec4a3937831c670"

[[kv_namespaces]]
binding = "VTT_API_KEYS"
id = "6ca81d1979184abdacceffa32dd2a48c"
